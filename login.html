<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bud Studios — Sign In</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050505;
    --card:#0f0f0f;
    --text:#ffffff;
    --muted:#9c9c9c;
    --red:#ff2d55;
    --blue:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

/* Noise Overlay */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity:.03;
    pointer-events:none;
    z-index:999;
}

/* Spotlight */

.spotlight{
    position:fixed;
    width:700px;
    height:700px;
    border-radius:50%;
    background:
    radial-gradient(circle,
    rgba(59,130,246,.12),
    rgba(255,45,85,.08),
    transparent 70%);
    pointer-events:none;
    z-index:0;
    transform:translate(-50%,-50%);
}

/* Grid */

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

.login-logo{
    position:fixed;
    top:30px;
    left:7%;
    font-size:1.5rem;
    font-weight:800;
    text-decoration:none;
    color:white;
    z-index:10;
}

.login-logo span{
    background:linear-gradient(90deg, var(--red), var(--blue));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.login-card{
    width:100%;
    max-width:420px;
    padding:50px 40px;
    border-radius:24px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    position:relative;
    z-index:1;
}

.login-card h1{
    font-size:2rem;
    margin-bottom:10px;
    text-align:center;
}

.login-card .sub{
    color:var(--muted);
    text-align:center;
    margin-bottom:30px;
    font-size:.95rem;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:.85rem;
    color:var(--muted);
}

input{
    width:100%;
    padding:14px 16px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.04);
    color:#fff;
    font-size:1rem;
    font-family:'Inter',sans-serif;
}

input:focus{
    outline:none;
    border-color:var(--blue);
}

.btn-signin{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    font-weight:600;
    font-size:1rem;
    color:#fff;
    background:linear-gradient(135deg,var(--red),var(--blue));
    transition:.3s;
}

.btn-signin:hover{
    transform:translateY(-4px);
}

.error-msg{
    color:var(--red);
    text-align:center;
    margin-bottom:15px;
    font-size:.9rem;
    min-height:18px;
}

</style>
</head>
<body>

<div class="grid"></div>
<div class="spotlight"></div>
<canvas id="particles"></canvas>

<a class="login-logo" href="index.html">
    Bud <span>Studios</span>
</a>

<div class="login-card">

    <h1>Sign In</h1>
    <p class="sub">Authorized personnel only.</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">

        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>

        <button type="submit" class="btn-signin">Sign in</button>

    </form>

</div>

<script>

/* Spotlight */

const spotlight = document.querySelector('.spotlight');

document.addEventListener('mousemove',e=>{
    spotlight.style.left=e.clientX+'px';
    spotlight.style.top=e.clientY+'px';
});

/* Particles */

const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-.5)*0.3,
        dy:(Math.random()-.5)*0.3
    });
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0)p.x=canvas.width;
        if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;
        if(p.y>canvas.height)p.y=0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,.3)";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});

/* Login validation */

const validUsers = {
    "Bud": "qwerty1234",
    "Shattered": "asdfgh5678"
};

document.getElementById('loginForm').addEventListener('submit', function(e){

    e.preventDefault();

    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if(validUsers[u] && validUsers[u] === p){
        localStorage.setItem('budStudiosAuth','true');
        window.location.href = 'index.html';
    } else {
        errorMsg.textContent = 'Invalid username or password.';
    }

});

</script>

</body>
</html>
