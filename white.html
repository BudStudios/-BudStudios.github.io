<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:radial-gradient(circle at center, #ffffff 0%, #f0f0f0 45%, #dcdcdc 100%);
    color:#000000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.message{
    font-size:clamp(1.1rem,2.6vw,1.5rem);
    font-weight:500;
    max-width:650px;
    line-height:1.6;
    margin-bottom:40px;
}

.overlay-buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:16px 28px;
    border-radius:14px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
    display:inline-block;
}

.btn-discord{
    background:linear-gradient(135deg,#ff2d55,#3b82f6);
    color:#ffffff;
}

.btn-login{
    border:1px solid #000000;
    color:#000000;
    background:transparent;
}

.btn:hover{
    transform:translateY(-4px);
}

</style>
</head>
<body>

<p class="message">
    Psst... websites still going under construction,
    maybe log in as a admin or owner to get authentication?
</p>

<div class="overlay-buttons">

    <a class="btn btn-discord"
       href="https://discord.gg/dHRw3CxgQ8"
       target="_blank">
        Join the community
    </a>

    <a class="btn btn-login"
       href="login.html"
       target="_parent">
        Login
    </a>

</div>

</body>
</html>
